<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="robots" content="noindex, nofollow">
<title>Portal Access | Eseyasa Productions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#514535",
                    "on-tertiary-fixed": "#311300",
                    "on-tertiary-container": "#743600",
                    "sapling": "#AEBA8A",
                    "on-surface-variant": "#d6c4af",
                    "inverse-on-surface": "#2f312e",
                    "on-tertiary-fixed-variant": "#733500",
                    "on-primary-fixed": "#291800",
                    "on-background": "#e3e3de",
                    "secondary-container": "#184f46",
                    "tertiary": "#ffc5a2",
                    "primary-fixed-dim": "#ffb952",
                    "background": "#121411",
                    "on-secondary": "#003730",
                    "leaf-muted": "#80917D",
                    "on-secondary-container": "#8abfb4",
                    "surface-dim": "#121411",
                    "surface": "#121411",
                    "secondary-fixed-dim": "#9cd1c5",
                    "surface-container-high": "#292b27",
                    "on-error": "#690005",
                    "surface-bright": "#383a36",
                    "on-primary-fixed-variant": "#633f00",
                    "tertiary-fixed-dim": "#ffb689",
                    "on-error-container": "#ffdad6",
                    "on-tertiary": "#512400",
                    "error": "#ffb4ab",
                    "on-primary-container": "#634000",
                    "surface-container-highest": "#333532",
                    "secondary-fixed": "#b7ede1",
                    "secondary": "#9cd1c5",
                    "surface-container-low": "#1a1c19",
                    "tertiary-container": "#fd9f60",
                    "tertiary-fixed": "#ffdbc7",
                    "outline": "#9e8e7c",
                    "on-secondary-fixed": "#00201b",
                    "primary": "#ffc87c",
                    "surface-container": "#1e201d",
                    "surface-variant": "#333532",
                    "surface-cream": "#FDF9F0",
                    "primary-fixed": "#ffddb3",
                    "on-primary": "#452b00",
                    "on-surface": "#e3e3de",
                    "surface-container-lowest": "#0d0f0c",
                    "inverse-primary": "#825500",
                    "surface-tint": "#ffb952",
                    "inverse-surface": "#e3e3de",
                    "error-container": "#93000a",
                    "primary-container": "#eea83b",
                    "on-secondary-fixed-variant": "#184f46"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "container-max": "1280px",
                    "gutter": "24px",
                    "margin-mobile": "16px",
                    "margin-desktop": "64px"
            },
            "fontFamily": {
                    "body-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-xl": ["Bricolage Grotesque"],
                    "display-lg": ["Bricolage Grotesque"],
                    "headline-md": ["Bricolage Grotesque"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "headline-xl-mobile": ["Bricolage Grotesque"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "56px", "fontWeight": "700"}],
                    "display-lg": ["80px", {"lineHeight": "88px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-xl-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .organic-bg {
            background: radial-gradient(circle at 10% 20%, rgba(24, 79, 70, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 200, 124, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(255, 180, 171, 0.05) 0%, transparent 60%);
        }
        .stagger-in > * {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Main Viewport Wrapper -->
<main class="min-h-screen w-full flex items-center justify-center relative organic-bg px-margin-mobile md:px-margin-desktop">
<!-- Background Organic Shape Decor (Abstract Tropics) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-secondary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-15%] left-[-10%] w-[600px] h-[600px] bg-primary-container/10 rounded-full blur-[120px]"></div>
<!-- Floating Organic Element -->
<div class="hidden md:block absolute top-1/4 left-12 w-64 h-96 bg-leaf-muted/5 opacity-40" style="clip-path: ellipse(50% 40% at 50% 50%); transform: rotate(15deg);"></div>
<div class="hidden md:block absolute bottom-1/4 right-12 w-72 h-80 bg-sapling/5 opacity-40" style="clip-path: ellipse(30% 60% at 50% 50%); transform: rotate(-25deg);"></div>
</div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-[480px] stagger-in">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10" style="animation-delay: 0.1s;">
<img alt="Eseyasa Productions Logo" class="w-24 h-24 mb-6 object-contain hover:scale-110 transition-transform duration-500 cursor-pointer" src="images/Image 1.png"/>
<h1 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-primary tracking-tight text-center">
                    Eseyasa Productions
                </h1>
<p class="font-body-md text-on-surface-variant mt-2 tracking-wide uppercase text-xs font-bold">Admin Portal Access</p>
</div>
<!-- Card Shell -->
<div class="bg-surface-container-low p-8 md:p-12 rounded-xl border border-outline-variant/30 backdrop-blur-xl relative overflow-hidden group shadow-2xl" style="animation-delay: 0.2s;">
<!-- Subtle Decorative Accent -->
<div class="absolute top-0 left-0 w-1 h-full bg-primary transform origin-bottom scale-y-0 group-hover:scale-y-100 transition-transform duration-700"></div>
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-sapling uppercase tracking-widest" for="email">
                            Email Address
                        </label>
<div class="relative group/input">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within/input:text-primary transition-colors">
                                alternate_email
                            </span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-outline/50" id="email" placeholder="admin@eseyasa.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-sm text-label-sm text-sapling uppercase tracking-widest" for="password">
                                Password
                            </label>
<a class="text-[10px] text-tertiary hover:underline uppercase font-bold tracking-tighter" href="#">Forgot?</a>
</div>
<div class="relative group/input">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within/input:text-primary transition-colors">
                                lock
                            </span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-12 text-on-surface focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-lg flex items-center justify-center gap-3 group/btn hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
                            Secure Login
                            <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">
                                arrow_forward
                            </span>
</button>
</div>
</form>
<!-- Security Assurance -->
<div class="mt-8 pt-8 border-t border-outline-variant/20 flex items-center justify-center gap-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="text-[10px] uppercase font-bold tracking-widest">Encrypted Management Protocol</span>
</div>
</div>
<!-- Secondary Links -->
<div class="mt-8 flex justify-center gap-8 text-on-surface-variant font-label-sm text-label-sm" style="animation-delay: 0.3s;">
<a class="hover:text-primary transition-colors flex items-center gap-2" href="index.html">
<span class="material-symbols-outlined text-[16px]">home</span>
                    Back to Website
                </a>
<a class="hover:text-primary transition-colors flex items-center gap-2" href="mailto:support@eseyasa.com">
<span class="material-symbols-outlined text-[16px]">support</span>
                    Contact Support
                </a>
</div>
</div>
</main>
<!-- Footer Identity (Mini) -->
<footer class="fixed bottom-8 w-full text-center pointer-events-none">
<p class="font-label-sm text-label-sm text-on-surface-variant/40 uppercase tracking-[0.2em]">
            © 2024 Eseyasa Productions • Cultural Rhythm in Order
        </p>
</footer>
<script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwd.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Simple animation trigger for visual feedback
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Verifying Credentials...';
            btn.classList.add('opacity-80', 'cursor-wait');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Access Granted';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-sapling', 'text-on-secondary');
                setTimeout(() => {
                    window.location.href = 'portal-workspace-z48.html';
                }, 800);
            }, 1500);
        });
    </script>
</body></html>
